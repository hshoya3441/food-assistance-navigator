<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Assistance Navigator</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      margin:0;
      background:#f5f5f5;
      color:#333;
    }
    header{
      background:#2e7d32;
      color:white;
      padding:16px;
      text-align:center;
    }
    .container{
      max-width:700px;
      margin:auto;
      padding:16px;
    }
    .search-box{
      background:white;
      padding:16px;
      border-radius:8px;
      margin-bottom:16px;
    }
    input, select, button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:6px;
      border:1px solid #ccc;
      font-size:16px
    }
    button{
      background:#2e7d32;
      color:white;
      border:none;
      cursor:pointer;
    }
    .result{
      background:white;
      padding:14px;
      border-radius:8px;
      margin-bottom:10px;
    }
    .name{
      font-weight:bold;
      font-size:18px;
    }
    .info{
      font-size:14px;
      margin-top:4px;
    }
  </style>
</head>

<body>

<header>
  <h2>Food Assistance Navigator</h2>
  <p>Find food assistance near you today</p>
</header>

<div class="container">

  <div class="search-box">
    <label>ZIP Code or City Name</label>
    <input id="zipInput" placeholder="Enter ZIP or City">

    <label>Type of Assistance</label>
    <select id="typeSelect">
      <option value="all">All</option>
      <option value="pantry">Food Pantry</option>
      <option value="meal">Free Meal</option>
    </select>

    <button onclick="searchByInput()">Search</button>
    <button onclick="searchByGPS()">Use My Location (GPS)</button>
  </div>

  <div id="results"></div>
</div>

<script>
  // ★ 施設データ
  const places = [
    {
      name:"San Antonio Food Bank",
      address:"5200 Historic, Old Hwy 90 W",
      type:"pantry",
      lat:29.4065,
      lng:-98.6230
    },
    {
      name:"New Braunfels Food Bank",
      address:"1620 S Seguin Ave",
      type:"pantry",
      lat:29.6974,
      lng:-98.1245
    }
  ];

  const API_KEY = "6b2e1f25fc9e3693673ff1e1efbe4968";

  // ★ ZIP または都市名 → 緯度経度を取得
  async function getLatLng(query){
  const url = `https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(query)}&limit=1&appid=${API_KEY}`;

  const res = await fetch(url);
  if(!res.ok) return null;

  const data = await res.json();
  if(data.length === 0) return null;

  return { lat: data[0].lat, lng: data[0].lon };
}



  // ★ 距離計算（Haversine）
  function distance(lat1, lon1, lat2, lon2){
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI/180;
    const dLon = (lon2 - lon1) * Math.PI/180;
    const a =
      Math.sin(dLat/2)**2 +
      Math.cos(lat1*Math.PI/180) *
      Math.cos(lat2*Math.PI/180) *
      Math.sin(dLon/2)**2;

    return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  // ★ 結果表示
  function showResults(list){
    const results = document.getElementById("results");
    results.innerHTML = "";

    list.forEach(p => {
      const div = document.createElement("div");
      div.className = "result";
      div.innerHTML = `
        <div class="name">${p.name}</div>
        <div class="info">Distance: ${p.dist.toFixed(2)} km</div>
        <div class="info">Type: ${p.type}</div>
        <div class="info">
          Address:
          <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.address)}"
             target="_blank"
             style="color:#1a73e8; text-decoration:underline;">
             ${p.address}
          </a>
        </div>
      `;
      results.appendChild(div);
    });
  }

  // ★ ZIP or City 検索
  async function searchByInput(){
    const query = document.getElementById("zipInput").value.trim();
    const type = document.getElementById("typeSelect").value;

    if(!query){
      alert("Please enter a ZIP code or city name");
      return;
    }

    document.getElementById("results").innerHTML = "<p>Searching...</p>";

    const userPos = await getLatLng(query);
    if(!userPos){
      document.getElementById("results").innerHTML =
        "<p>Location not found. Please check ZIP or city name.</p>";
      return;
    }

    const filtered = places
      .filter(p => type === "all" || p.type === type)
      .map(p => ({
        ...p,
        dist: distance(userPos.lat, userPos.lng, p.lat, p.lng)
      }))
      .sort((a,b) => a.dist - b.dist);

    showResults(filtered);
  }

  // ★ GPS検索
  function searchByGPS(){
    document.getElementById("results").innerHTML = "<p>Getting your location...</p>";

    navigator.geolocation.getCurrentPosition(pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      const type = document.getElementById("typeSelect").value;

      const filtered = places
        .filter(p => type === "all" || p.type === type)
        .map(p => ({
          ...p,
          dist: distance(lat, lng, p.lat, p.lng)
        }))
        .sort((a,b) => a.dist - b.dist);

      showResults(filtered);

    }, () => {
      alert("GPS location could not be retrieved");
    }, {
      enableHighAccuracy: false,
      timeout: 5000,
      maximumAge: 60000
    });
  }
</script>

</body>
</html>
